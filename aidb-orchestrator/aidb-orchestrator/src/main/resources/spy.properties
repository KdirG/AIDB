# P6Spy properties
modulelist=com.p6spy.engine.logging.P6LogFactory,com.p6spy.engine.outage.P6OutageFactory

# Log Message Format
logMessageFormat=com.p6spy.engine.spy.appender.CustomLineFormat
customLogMessageFormat=SQL Profiler [Time: %(executionTime) ms] [Category: %(category)] => %(sqlSingleLine)

# Use Custom Logger to forward to ProfilerService
appender=com.example.service.CustomP6Logger

# Execution time threshold for outage log (e.g. 2000 ms = 2 seconds)
outagedetection=true
outagedetectioninterval=2000
